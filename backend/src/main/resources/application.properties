spring.application.name=backend

# H2 In-Memory Database (local development)
spring.datasource.url=jdbc:h2:mem:digitalclassroom;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console - browse at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate - let Hibernate auto-create tables from @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL script init (Hibernate handles schema creation)
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=mySecretKey
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary (not needed locally - file uploads will fail gracefully)
cloudinary.cloud-name=local
cloudinary.api-key=local
cloudinary.api-secret=local

# Server
server.port=8080
